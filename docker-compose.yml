version: "3.9"

services:
  mcp-tools:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      - PYTHONUNBUFFERED=1
      - SERVER_NAME=mcp-tools
      - ENABLE_TOOLS=1
      - ENABLE_VECTOR=0
    container_name: mcp-tools
    ports:
      - "8001:8000"
    depends_on:
      - qdrant
      - redis
    volumes:
      - ./workspace:/workspace
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  mcp-knowledge:
    container_name: mcp-knowledge
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      - PYTHONUNBUFFERED=1
      - SERVER_NAME=mcp-knowledge
      - ENABLE_TOOLS=0
      - ENABLE_VECTOR=1
    ports:
      - "9000:8000"
    depends_on:
      - qdrant
      - redis
    volumes:
      - ./workspace:/workspace
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  registry:
    container_name: mcp-registry
    build:
      context: ./registry
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      - MCP_TOOLS_URL=http://mcp-tools:8000
      - MCP_KNOWLEDGE_URL=http://mcp-knowledge:8000
    ports:
      - "8080:8080"
    depends_on:
      - mcp-tools
      - mcp-knowledge
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"

  # Optional: enable only if you plan to build tools needing Postgres
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_DB: ${POSTGRES_DB:-mcp}
  #     POSTGRES_USER: ${POSTGRES_USER:-mcp}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - pg_data:/var/lib/postgresql/data

volumes:
  qdrant_storage:
  # pg_data:
