version: "3.9"

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - registry
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  mcp-tools:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g

  mcp-knowledge:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2g

  registry:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m

  qdrant:
    restart: unless-stopped

  redis:
    restart: unless-stopped
