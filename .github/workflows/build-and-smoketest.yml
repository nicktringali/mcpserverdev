name: build-and-smoketest

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Prepare CI env
        run: |
          cat > .env <<'EOFENV'
          OPENAI_API_KEY=
          TAVILY_API_KEY=
          MCP_TOKEN=
          QDRANT_URL=http://qdrant:6333
          REDIS_URL=redis://redis:6379/0
          SERVER_NAME=mcp-ci
          ENABLE_TOOLS=1
          ENABLE_VECTOR=1
          ENABLE_EXEC=0
          ENABLE_TESTS=0
          ENABLE_LINT=0
          EOFENV
          mkdir -p workspace
      - name: Build server image
        run: docker build -t mcp-supercharger-server ./server
      - name: Build registry image
        run: docker build -t mcp-supercharger-registry ./registry
      - name: Compose config
        run: docker compose config
      - name: Compose up and wait for health
        run: |
          docker compose up -d
          for url in http://localhost:8001/health http://localhost:9000/health http://localhost:8080/health; do
            echo "Waiting for $url ..."
            for i in {1..60}; do
              if curl -fsS "$url" >/dev/null; then
                echo "$url is up"
                break
              fi
              sleep 2
            done
            curl -f "$url"
          done
      - name: Debug web_search (non-fatal)
        continue-on-error: true
        run: curl -fsS "http://localhost:8001/debug/web_search?query=hello" >/devnull
      - name: Logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --tail=200
      - name: Teardown
        if: always()
        run: docker compose down -v
