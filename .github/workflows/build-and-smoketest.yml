name: build-and-smoketest

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Prepare CI env
        run: |
          cat > .env <<'ENVEOF'
          OPENAI_API_KEY=
          TAVILY_API_KEY=
          MCP_TOKEN=
          QDRANT_URL=http://qdrant:6333
          REDIS_URL=redis://redis:6379/0
          SERVER_NAME=mcp-ci
          ENABLE_TOOLS=1
          ENABLE_VECTOR=1
          ENABLE_EXEC=0
          ENABLE_TESTS=0
          ENABLE_LINT=0
          ENVEOF
          mkdir -p workspace
      - name: Build server image
        run: docker build -t mcp-supercharger-server ./server
      - name: Build registry image
        run: docker build -t mcp-supercharger-registry ./registry
      - name: Compose config
        run: docker compose config
      - name: Smoke test compose up
        run: |
          docker compose up -d
          sleep 25
          curl -f http://localhost:8001/health
          curl -f http://localhost:9000/health
          curl -f http://localhost:8080/health
          curl -f "http://localhost:8001/debug/web_search?query=hello"
      - name: Logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --tail=200
      - name: Teardown
        if: always()
        run: docker compose down -v
